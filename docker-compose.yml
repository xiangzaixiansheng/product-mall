services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.multistage
    ports:
      - "3000:3000"
    environment:
      - ENV=prod
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_*=root*123
      - DB_NAME=product_mall
      - REDIS_ADDR=redis:6379
      - SESSION_*=${SESSION_*:-change-me-in-production}
      - JWT_*_KEY=${JWT_*_KEY:-change-me}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_*: root*123
      MYSQL_DATABASE: product_mall
      MYSQL_CHARSET: utf8mb4
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  redis_data:
