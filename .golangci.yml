run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - bodyclose
    - exportloopref
    - misspell
    - unconvert
    - unparam

linters-settings:
  gosec:
    excludes:
      - G104
  errcheck:
    check-type-assertions: true

issues:
  exclude-dirs:
    - vendor
    - docs
  max-issues-per-linter: 50
  max-same-issues: 3
